<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            margin: 0%;
            padding: 0%;
            box-sizing: border-box;
        }
        .body{
            width: 100%;
            height: 100vh;
            background-color: red;
            display: flex;
            justify-content: center;
            align-items: center;
            background-image: url("/image/background.jpg");
        }
        .main{
            width: 70%;
            height: 70vh;
            background-color: black;
            display: flex;
            border-radius: 10px;
        }

        .left{
            width: 50%;
            height: 70vh;
            background-color: palevioletred;
            background-image: url("/image/naruto.jpg");
            background-size:cover;
            background-repeat: no-repeat;
            background-position: top;
            border-radius: 10px;
        }

        .right{
            width: 50%;
            height: 70vh;
            background-color: rgba(0, 0, 255, 0.518);
            display: flex;
            justify-content: center;
            flex-direction: column;
            align-items: center;
            padding: 60px;
            border-radius: 10px;
        }
        button{
            /* width: 20%; */
            padding: 10px 30px;
            border-radius: 30px;
            margin-right: 30px;
            
        }
        button:hover{
            background-color: rgba(0, 0, 255, 0.446);
        }
        .adjust{
            display: flex;
            justify-content: space-between;
            width: 100%;
            
        }
        .pass{
            /* margin-top: 20px; */
            padding: 10px;
            border-radius: 10px;
            
        }

        .tex{
            /* margin-top: 20px; */
            padding: 10px;
            border-radius: 10px;
            align-items: start;
            
        }

        h2{
            color: aqua;
            padding-top: 20px;
            border-radius: 10px;
            align-items:start;
        }
        p{
            padding-right: 100px;
        }
        .p1{
            padding-left: 20px;
            margin-top: 10px;
        }

        .end{
            padding-left: 50px;
            margin-top: 20px;
            padding-right: 50px;
            background-color: blueviolet;
            
            
        }
    </style>
</head>
<body>
    <div class="body">
        <div class="main">
            <div class="left"></div>
            <div class="right">
             <div class="adjust">
                <button>
                    click here
                 </button>
                <button>
                click me
                </button>
                </div>
            <h2>Create Acoount</h2>
            <p>Enter name</p>
            <input  class="tex"  type="text">
            <p class="p1">Enter Password</p>
                <input class="pass" type="password">
                <button class="end">
                    Log in
                </button>    
            
            </div>
        </div>
    </div>
</body>
</html>
