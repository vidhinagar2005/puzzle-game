<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            background-image: url("https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSPma41PI7XQnxExSAKI3kBSjU3msW63hJRvA&s");
        }

        .wrapper{
            background-color: white;
            width: 30%;
            margin: auto;
            border-radius: 20px;
            margin-top: 30px;
            box-shadow: 5px 5px 5px #ccc;
            
        }

        .logo{
            padding-top: 20px;
        }

        label{
            color: black;
        }

        h2{
            text-align: center;

        }

        label{
            color: grey;
            padding: 40px;
            font-weight: bold;
        }

        input{
            padding: 5px;
            margin: 10px;
            width: 80%;
            margin-left: 40px;
        }

        .forgot{
            text-align: right;
            padding-right: 30px;
            font-weight: bold;
            color: gray;
        }

        button{
            background-color: yellow;
            border-radius: 20px;
            width: 30%;
            margin: 40px;
            padding: 5px;
            font-weight: bold;
            box-shadow: 10px 10px 10px #ccc;

        }

        .out{
            text-align: center;
            padding: 20px;
            font-weight: bold;
        }

        button:hover{
            cursor: pointer;
        }
        .forgot:hover{
            font-weight: bolder;
            color: black;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="wrapper">
        <div class="logo">
            <center><img src="/image/download (1).png"width="10%" alt=""></center>
        </div>
        <div>
            <h2>Log in to snapchat</h2>
        </div>

        <div>
            <label>user name or Email</label>
        </div>

        <div>
            <input type="text" name="fname">

        </div>

        <div>
            <label>
                Password
            </label>
        </div>

        <div>
            <input type="password" name="password">
        </div>

        <div class="forgot">
            Forgot password?
        </div>

        <div>
           <center> <button>Log in</button></center>
        </div>
    </div>

    <div class="out">
        New to snapchat?&nbsp;&nbsp;&nbsp;  Sign up
    </div>
    
</body>
</html>
